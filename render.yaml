services:
  - type: web
    name: inventory-order-api
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-order-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        sync: false

databases:
  - name: inventory-order-db
    plan: free
